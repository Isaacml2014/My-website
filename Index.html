isaacml2014.github.io<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>isaacml2014</title>
    <style>
        body {
            background-color: #121214;
            color: #e1e1e6;
            font-family: sans-serif;
            text-align: center;
            padding: 80px 20px;
            margin: 0;
        }

        .profile-container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 1.1rem;
            color: #a8a8b3;
            margin-bottom: 40px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            display: block;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, filter 0.2s;
        }

        .link-card:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Platform Specific Colors */
        .github {
            background-color: #24292e;
            color: #ffffff;
            border: 1px solid #444c56;
        }

        .youtube {
            background-color: #ff0000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>isaacml2014</h1>
        <p>Welcome to my website! Here are the links to my Youtube and github.</p>

        <div class="links-container">
            <a href="https://github.com/isaaacml2014" target="_blank" class="link-card github">
                GitHub Repository
            </a>
            
            <a href="https://youtube.com/@isaacml2014" target="_blank" class="link-card youtube">
                YouTube Channel
            </a>
        </div>
    </div>

</body>
</html>
